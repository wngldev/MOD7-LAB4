openapi: "3.0.3"
info:
  title: "Cuentas Bancarias API"
  # --- FASE 1: GOBERNANZA DEL CONTRATO (ERROR INTENCIONAL 1) ---
  version: "" #  ERROR: La versión no debe estar vacía. ACCIÓN: Cambia a "1.0.0"
  description: |
    API para gestionar cuentas bancarias de clientes.
    Permite consultar las cuentas asociadas a un cliente.
  contact:
    name: "Equipo de APIs"
    email: "apis@banco.com"

tags:
  - name: Cuentas
    description: "Operaciones relacionadas con cuentas bancarias"

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    description: "API Gateway Endpoint"
    variables:
      apiId:
        default: "xxx"
      region:
        default: "us-east-1"
      stage:
        default: "test"

paths:
  /clientes/{cliente-id}/cuentas:
    get:
      summary: "Obtener cuentas bancarias de un cliente"
      description: "Retorna una lista de todas las cuentas bancarias asociadas al ID del cliente proporcionado."
      
      # --- FASE 1: GOBERNANZA DEL CONTRATO (ERROR INTENCIONAL 2) ---
      # operationId: listarCuentasCliente # ❌ ERROR: Falta el operationId. ACCIÓN: Descomenta esta línea
      
      tags:
        - Cuentas
      parameters:
        - name: cliente-id
          in: path
          required: true
          description: "Identificador único del cliente"
          schema:
            type: string
            example: "CLI001"
      responses:
        "200":
          description: "Lista de cuentas bancarias del cliente"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CuentasResponse"
              example:
                clienteId: "CLI001"
                cuentas:
                  - numeroCuenta: "1234567890"
                    tipo: "AHORROS"
                    moneda: "PEN"
                    titular: "Juan Pérez"
                    saldo: 5000.00
                  - numeroCuenta: "0987654321"
                    tipo: "CORRIENTE"
                    moneda: "USD"
                    titular: "Juan Pérez"
                    saldo: 1200.50
        "404":
          description: "Cliente no encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      x-amazon-apigateway-integration:
        type: MOCK
        requestTemplates:
          application/json: |
            {
              "statusCode": 200
            }
        responses:
          default:
            statusCode: "200"
            responseTemplates:
              application/json: |
                {
                  "clienteId": "$input.params('cliente-id')",
                  "cuentas": [
                    {
                      "numeroCuenta": "1234567890",
                      "tipo": "AHORROS",
                      "moneda": "PEN",
                      "titular": "Juan Pérez (Mock)",
                      "saldo": 5000.00
                    },
                    {
                      "numeroCuenta": "0987654321",
                      "tipo": "CORRIENTE",
                      "moneda": "USD",
                      "titular": "Juan Pérez (Mock)",
                      "saldo": 1200.50
                    }
                  ]
                }
        passthroughBehavior: "when_no_match"

    # --- SOLO PARA LABORATORIO PROPUESTO: DESCOMENTAR PARA PUBLICAR EL MOCK ---
